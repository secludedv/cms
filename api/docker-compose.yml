services:
  mysql:
    image: mysql:8.0
    container_name: cms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-cms_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - cms_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cms-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: false
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  cms_mysql_data:
